[module]
name        = "mistral-rs"
alias       = ["llm"]
type        = "ai"
author      = "FreeSynergy.Node"
version     = "0.0.1"
tags        = ["ai", "llm", "inference", "mistral", "local-ai", "rust", "native"]
description = "mistral.rs — local LLM inference engine in pure Rust, OpenAI-compatible API"
website     = "https://github.com/EricLBuehler/mistral.rs"
repository  = "https://github.com/EricLBuehler/mistral.rs"
port        = 1234
health_path = "/health"
health_port = 1234

[module.constraints]
per_host = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"
models_dir = "{{ module_vars.config_dir }}/models"
binary     = "/usr/local/bin/mistralrs"

[service]
binary = "{{ module_vars.binary }}"
args   = [
    "serve",
    "--port", "{{ module.port }}",
    "--host", "127.0.0.1",
    "-m", "{{ model_id | default('mistralai/Mistral-7B-Instruct-v0.3') }}",
]
user  = "{{ run_user | default('fsn') }}"
group = "{{ run_user | default('fsn') }}"

[service.healthcheck]
cmd          = "curl -fsS http://localhost:1234/health || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "60s"

[environment]
MODEL_ID = "{{ model_id | default('mistralai/Mistral-7B-Instruct-v0.3') }}"
HOST     = "127.0.0.1"
PORT     = "1234"

[setup]

[[setup.fields]]
key         = "project_root"
label       = "Data Directory"
description = "Base path where model files are stored"
field_type  = "string"
default     = "/srv/fsn"
skip_if_set = true

[[setup.fields]]
key         = "service_domain"
label       = "Domain"
description = "Domain mistral.rs is reachable at via the proxy, e.g. llm.example.com"
field_type  = "string"
default     = ""
skip_if_set = true

[[setup.fields]]
key         = "model_id"
label       = "Model"
description = "Model to load (e.g. mistralai/Mistral-7B-Instruct-v0.3, or path to local GGUF)"
field_type  = "string"
default     = "mistralai/Mistral-7B-Instruct-v0.3"
skip_if_set = false

[contract]
upstream_tls = false

[[contract.routes]]
id          = "api"
path        = "/v1"
strip       = false
description = "OpenAI-compatible REST API (chat/completions, models, embeddings)"
