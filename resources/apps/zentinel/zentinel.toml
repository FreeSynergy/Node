# Resource class definition – resources/apps/zentinel/zentinel.toml
#
# Field order (MANDATORY per RULES.md):
#   module → vars → load → service → environment → setup
#
# Zentinel is a native Rust reverse proxy — deployed as a systemd service,
# NOT as a Podman container. Ports 80 and 443 use systemd socket activation.

[module]
name        = "zentinel"
alias       = []
types       = ["proxy", "webhoster_simple"]
author      = "FreeSynergy.Node"
version     = "0.1.0"
tags        = ["proxy", "reverse-proxy", "tls", "acme", "native"]
description = "Zentinel reverse proxy — native Rust binary with automatic TLS via ACME"
website     = "https://github.com/zentinelproxy/zentinel"
repository  = "https://github.com/zentinelproxy/zentinel"
port        = 443
health_path = "/"
health_port = 80

[module.constraints]
per_host = 1
per_ip   = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"
kdl_path   = "{{ module_vars.config_dir }}/config/zentinel.kdl"
binary     = "/usr/local/bin/zentinel"

[load.modules.zentinel-control-plane]
service_class = "apps/zentinel-control-plane"

[service]
binary       = "{{ module_vars.binary }}"
args         = ["--config", "{{ module_vars.kdl_path }}"]
user         = "zentinel"
group        = "zentinel"
socket_ports = [80, 443]

[service.healthcheck]
cmd          = "curl -fsS http://localhost:80/ || exit 1"
interval     = "15s"
timeout      = "3s"
retries      = 3
start_period = "10s"

[environment]
ZENTINEL_CONFIG = "{{ module_vars.kdl_path }}"

[setup]

[[setup.fields]]
key         = "project_root"
label       = "Data Directory"
description = "Base path where service data is stored, e.g. /srv/fsn or /home/user/fsn"
field_type  = "string"
default     = "/srv/fsn"
skip_if_set = true

[[setup.fields]]
key         = "acme_email"
label       = "ACME Email"
description = "Email address for Let's Encrypt / ACME certificate registration"
field_type  = "email"
default     = ""
skip_if_set = true

[[setup.fields]]
key         = "acme_provider"
label       = "ACME Provider"
description = "Certificate authority to use for automatic TLS"
field_type  = "select"
options     = ["letsencrypt", "zerossl", "none"]
default     = "letsencrypt"
skip_if_set = false

[[setup.fields]]
key         = "dns_provider"
label       = "DNS Provider"
description = "DNS provider for DNS-01 challenge (required for wildcard certs)"
field_type  = "select"
options     = ["cloudflare", "hetzner", "none"]
default     = "none"
skip_if_set = false

# ── Plugin manifest ────────────────────────────────────────────────────────────
# Declares what this module can do when called via the process plugin protocol.
# The plugin executable lives at Store/Node/proxy/zentinel/plugin.
[plugin]
commands = ["generate-config"]
protocol = 1

[plugin.inputs]
services = true   # needs all peer services to generate routing config

[[plugin.outputs]]
name     = "proxy-config"
template = "templates/zentinel.kdl.j2"
dest     = "{{ config_dir }}/config/zentinel.kdl"
