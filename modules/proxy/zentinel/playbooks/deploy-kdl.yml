---
# Zentinel KDL config management (Marker-Based)
#
# Manages FSN-owned route blocks without touching sections owned by the
# Control-Plane or operator. Each service gets exactly one block wrapped in:
#   # === FSN-MANAGED-START: <name> ===
#   # === FSN-MANAGED-END:   <name> ===
#
# Naming convention:
#   <instance_name>          – L7 HTTPS service route
#   <instance_name>-tcp      – Layer-4 TCP routes for mail (Stalwart)
#   <instance_name>-sandbox  – CryptPad sandbox domain
#   static-sites             – Root domain (branding, Matrix, landing page)

# ── Step 1: Initialise variables ─────────────────────────────────────────────

- name: "Set KDL paths and project variables"
  ansible.builtin.set_fact:
    _kdl_path: "{{ module_vars.config_dir }}/config/zentinel.kdl"
    _kdl_tpl: "{{ module_path }}/templates"
    _project_name: "{{ project_cfg.project.name }}"
    _project_domain: "{{ project_cfg.project.domain }}"
    _project_services: []

# ── Step 2: Build service list ───────────────────────────────────────────────

- name: "Build service list from project modules"
  ansible.builtin.set_fact:
    _project_services: >-
      {{ _project_services + [{
        'name': item.key,
        'type': item.value.module_class.split('/')[0],
        'subdomain': item.key,
        'container_name': item.key,
        'port': _ports[item.value.module_class] | default(3000),
        'aliases': _aliases[item.key] | default([]),
        'auth_agent': _auth_agent[item.key] | default(false),
        'health_path': _health_paths[item.value.module_class] | default(''),
        'health_port': _health_ports[item.value.module_class]
                       | default(_ports[item.value.module_class] | default(3000)),
        'health_scheme': _health_schemes[item.value.module_class] | default('http')
      }] }}
  loop: "{{ project_cfg.load.modules | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  vars:
    _ports:
      auth/kanidm: 8443
      mail/stalwart: 443
      git/forgejo: 3000
      wiki/outline: 3000
      collab/cryptpad: 3000
      chat/tuwunel: 8008
      tasks/vikunja: 3456
      tickets/pretix: 8000
      maps/umap: 8000
      observability/openobserver: 5080
    _health_paths:
      auth/kanidm: "/"
      git/forgejo: "/api/healthz"
      wiki/outline: "/_health"
      collab/cryptpad: "/"
      chat/tuwunel: "/_matrix/client/versions"
      tasks/vikunja: "/api/v1/info"
      tickets/pretix: "/healthcheck/"
      maps/umap: "/"
      observability/openobserver: "/healthz"
      mail/stalwart: "/healthz"
    _health_ports:
      auth/kanidm: 8443
      mail/stalwart: 443
    _health_schemes:
      auth/kanidm: "https"
      mail/stalwart: "https"
    _aliases: {}
    _auth_agent:
      openobserver: true

# ── Step 3: Classify services by type ────────────────────────────────────────

- name: "Classify services by type"
  ansible.builtin.set_fact:
    _l7_services: "{{ _project_services | rejectattr('type', 'equalto', 'mail') | list }}"
    _mail_services: "{{ _project_services | selectattr('type', 'equalto', 'mail') | list }}"
    _collab_services: "{{ _project_services | selectattr('type', 'equalto', 'collab') | list }}"
    _chat_services: "{{ _project_services | selectattr('type', 'equalto', 'chat') | list }}"

# ── Step 4: Compute desired block names (for reconciliation) ─────────────────

- name: "Compute desired managed block names"
  ansible.builtin.set_fact:
    _desired_blocks: >-
      {{ _l7_services | map(attribute='name') | list
         + _mail_services | map(attribute='name') | map('regex_replace', '$', '-tcp') | list
         + _collab_services | map(attribute='name') | map('regex_replace', '$', '-sandbox') | list
         + ['static-sites'] }}

# ── Step 5: Create initial KDL file (global block only, written once) ─────────

- name: "Ensure Zentinel config directory exists"
  ansible.builtin.file:
    path: "{{ _kdl_path | dirname }}"
    state: directory
    mode: "0755"

- name: "Create initial KDL file with global settings (skip if exists)"
  ansible.builtin.template:
    src: "{{ _kdl_tpl }}/zentinel-global.kdl.j2"
    dest: "{{ _kdl_path }}"
    mode: "0644"
    force: false
  vars:
    zentinel_acme_email: "{{ project_cfg.project.contact.acme_email | default('') }}"

# ── Step 6: Snapshot file before changes (for reload detection) ───────────────

- name: "Snapshot KDL file checksum before changes"
  ansible.builtin.stat:
    path: "{{ _kdl_path }}"
    checksum_algorithm: sha256
  register: _kdl_before

# ── Step 7: Manage L7 HTTPS service blocks ────────────────────────────────────

- name: "Manage L7 route block for {{ item.name }}"
  ansible.builtin.blockinfile:
    path: "{{ _kdl_path }}"
    marker: "# === FSN-MANAGED-{mark}: {{ item.name }} ==="
    marker_begin: "START"
    marker_end: "END"
    block: "{{ lookup('template', _kdl_tpl + '/zentinel-block-l7.kdl.j2') }}"
    state: present
  loop: "{{ _l7_services }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    service: "{{ item }}"
    project_domain: "{{ _project_domain }}"

# ── Step 8: Manage Layer-4 mail blocks ───────────────────────────────────────

- name: "Manage mail TCP block for {{ item.name }}"
  ansible.builtin.blockinfile:
    path: "{{ _kdl_path }}"
    marker: "# === FSN-MANAGED-{mark}: {{ item.name }}-tcp ==="
    marker_begin: "START"
    marker_end: "END"
    block: "{{ lookup('template', _kdl_tpl + '/zentinel-block-mail.kdl.j2') }}"
    state: present
  loop: "{{ _mail_services }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    service: "{{ item }}"
    project_domain: "{{ _project_domain }}"

# ── Step 9: Manage CryptPad sandbox blocks ────────────────────────────────────

- name: "Manage CryptPad sandbox block for {{ item.name }}"
  ansible.builtin.blockinfile:
    path: "{{ _kdl_path }}"
    marker: "# === FSN-MANAGED-{mark}: {{ item.name }}-sandbox ==="
    marker_begin: "START"
    marker_end: "END"
    block: "{{ lookup('template', _kdl_tpl + '/zentinel-block-sandbox.kdl.j2') }}"
    state: present
  loop: "{{ _collab_services }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    service: "{{ item }}"
    project_domain: "{{ _project_domain }}"

# ── Step 10: Manage static-sites block (always present) ──────────────────────

- name: "Manage static-sites block"
  ansible.builtin.blockinfile:
    path: "{{ _kdl_path }}"
    marker: "# === FSN-MANAGED-{mark}: static-sites ==="
    marker_begin: "START"
    marker_end: "END"
    block: "{{ lookup('template', _kdl_tpl + '/zentinel-block-static.kdl.j2') }}"
    state: present
  vars:
    project_domain: "{{ _project_domain }}"
    project_name: "{{ _project_name }}"
    chat_services: "{{ _chat_services }}"

# ── Step 11: Reconcile – remove blocks for services no longer in project ──────

- name: "Read KDL file for reconciliation"
  ansible.builtin.slurp:
    src: "{{ _kdl_path }}"
  register: _kdl_raw

- name: "Find all FSN-managed block names in KDL"
  ansible.builtin.set_fact:
    _managed_blocks: >-
      {{ (_kdl_raw.content | b64decode)
         | regex_findall('# === FSN-MANAGED-START: (\S+) ===') }}

- name: "Remove stale managed block {{ item }}"
  ansible.builtin.blockinfile:
    path: "{{ _kdl_path }}"
    marker: "# === FSN-MANAGED-{mark}: {{ item }} ==="
    marker_begin: "START"
    marker_end: "END"
    state: absent
  loop: "{{ _managed_blocks | difference(_desired_blocks) }}"

# ── Step 12: Hot-reload Zentinel if config changed ────────────────────────────

- name: "Snapshot KDL file checksum after changes"
  ansible.builtin.stat:
    path: "{{ _kdl_path }}"
    checksum_algorithm: sha256
  register: _kdl_after

- name: "Reload Zentinel config (hot-reload, no restart)"
  ansible.builtin.command:
    cmd: "podman exec {{ instance_name }} zentinel reload"
  failed_when: false
  changed_when: true
  when: _kdl_before.stat.checksum != _kdl_after.stat.checksum
