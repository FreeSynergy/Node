[module]
name        = "kanidm"
alias       = ["auth"]
type        = "auth"
author      = "FreeSynergy.Node"
version     = "0.0.1"
tags        = ["auth", "identity", "oidc", "ldap"]
description = "Kanidm identity management server"
website     = "https://kanidm.com"
repository  = "https://github.com/kanidm/kanidm"
port        = 8443
health_path   = "/status"
health_port   = 8443
health_scheme = "https"

[module.constraints]
# no limits

[module.federation]
enabled   = true
min_trust = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"
domain     = "{{ service_domain }}"
origin     = "https://{{ module_vars.domain }}"

[load.modules]
[load.services]

[container]
name      = "{{ instance_name }}"
image     = "docker.io/kanidm/server"
image_tag = "latest"
volumes   = ["{{ module_vars.config_dir }}/data:/data:Z"]

[container.healthcheck]
cmd          = "kanidmd healthcheck -c /data/server.toml"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "30s"

[environment]
# No required environment variables for kanidm.
# Initial admin setup is done via `kanidmd recover-account idm_admin` on first run.

[setup]

[[setup.fields]]
key         = "service_domain"
label       = "Domain"
description = "The domain Kanidm is reachable at, e.g. auth.example.com"
field_type  = "string"
default     = ""
skip_if_set = true

[[setup.fields]]
key         = "project_root"
label       = "Data Directory"
description = "Base path where service data is stored, e.g. /srv/fsn or /home/user/fsn"
field_type  = "string"
default     = "/srv/fsn"
skip_if_set = true

[contract]
upstream_tls = true

[[contract.routes]]
id          = "main"
path        = "/"
strip       = false
description = "Kanidm web UI + REST API"
