---
# restart-stack.yml – Stop + start + restart hooks

- name: "FreeSynergy.Node – Restart Stack"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Set project variables"
      ansible.builtin.set_fact:
        project_name: "{{ project_cfg.project.name }}"
        project_domain: "{{ project_cfg.project.domain }}"
        project_root: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}"

    - name: "Check if vault file exists"
      ansible.builtin.stat:
        path: "{{ project_root }}/vault.yml"
      register: vault_file

    - name: "Load vault variables"
      ansible.builtin.include_vars:
        file: "{{ project_root }}/vault.yml"
      no_log: true
      when: vault_file.stat.exists

    - name: "Restart each module"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/restart-module.yml"
      loop: "{{ project_cfg.load.modules | dict2items }}"
      loop_control:
        loop_var: module_entry
        label: "{{ module_entry.key }}"
