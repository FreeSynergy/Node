---
# Task: Restart a single module instance

- name: "Set module variables for {{ module_entry.key }}"
  ansible.builtin.set_fact:
    instance_name: >-
      {{ (parent_instance_name ~ '-' ~ module_entry.key)
         if (parent_instance_name | default('') | length > 0)
         else module_entry.key }}
    module_class: "{{ module_entry.value.module_class }}"
    module_path: "{{ fsn_root }}/modules/{{ module_entry.value.module_class }}"

- name: "Read module class file"
  ansible.builtin.include_vars:
    file: "{{ module_path }}/{{ module_class | basename }}.yml"
    name: module_cfg

# Sub-modules restart BEFORE the parent so connections are available on startup.
- name: "Restart sub-modules"
  when: module_cfg.load.modules | default({}) | length > 0
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/restart-module.yml"
  loop: "{{ module_cfg.load.modules | dict2items }}"
  loop_control:
    loop_var: sub_module_entry
    label: "{{ sub_module_entry.key }}"
  vars:
    parent_instance_name: "{{ instance_name }}"
    module_entry: "{{ sub_module_entry }}"

# Re-apply parent state after sub-module recursion overwrites set_facts.
- name: "Re-read parent module class file"
  ansible.builtin.include_vars:
    file: "{{ fsn_root }}/modules/{{ module_entry.value.module_class }}/{{ module_entry.value.module_class | basename }}.yml"
    name: module_cfg

- name: "Re-apply parent instance_name"
  ansible.builtin.set_fact:
    instance_name: >-
      {{ (parent_instance_name ~ '-' ~ module_entry.key)
         if (parent_instance_name | default('') | length > 0)
         else module_entry.key }}
    module_path: "{{ fsn_root }}/modules/{{ module_entry.value.module_class }}"

- name: "Restart service {{ instance_name }}"
  ansible.builtin.systemd:
    name: "{{ instance_name }}.service"
    state: restarted
    scope: user

- name: "Run restart hooks"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/run-module-hooks.yml"
  vars:
    hook_phase: "restart"
