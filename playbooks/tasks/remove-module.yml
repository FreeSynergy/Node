---
# Task: Remove a single module instance completely (stop + delete all data)

- name: "Set module variables for {{ module_entry.key }}"
  ansible.builtin.set_fact:
    instance_name: >-
      {{ (parent_instance_name ~ '-' ~ module_entry.key)
         if (parent_instance_name | default('') | length > 0)
         else module_entry.key }}
    module_class: "{{ module_entry.value.module_class }}"
    module_path: "{{ fsn_root }}/modules/{{ module_entry.value.module_class }}"

- name: "Read module class file"
  ansible.builtin.include_vars:
    file: "{{ module_path }}/{{ module_class | basename }}.yml"
    name: module_cfg

- name: "Run remove hooks"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/run-module-hooks.yml"
  vars:
    hook_phase: "remove"
  failed_when: false

- name: "Stop service {{ instance_name }}"
  ansible.builtin.systemd:
    name: "{{ instance_name }}.service"
    state: stopped
    enabled: false
    scope: user
  failed_when: false

- name: "Remove Quadlet file"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/containers/systemd/{{ instance_name }}.container"
    state: absent

- name: "Remove env file"
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/containers/systemd/{{ instance_name }}.env"
    state: absent

- name: "Remove config directory"
  ansible.builtin.file:
    path: "{{ project_root }}/configs/{{ instance_name }}"
    state: absent

- name: "Remove data directory"
  ansible.builtin.file:
    path: "{{ project_root }}/data/{{ instance_name }}"
    state: absent

# Sub-modules removed AFTER parent files are cleaned up.
- name: "Remove sub-modules"
  when: module_cfg.load.modules | default({}) | length > 0
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/remove-module.yml"
  loop: "{{ module_cfg.load.modules | dict2items | reverse | list }}"
  loop_control:
    loop_var: sub_module_entry
    label: "{{ sub_module_entry.key }}"
  vars:
    parent_instance_name: "{{ instance_name }}"
    module_entry: "{{ sub_module_entry }}"

- name: "Reload systemd"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
